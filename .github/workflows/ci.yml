name: DMP Platform CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # Gate 1 — Static analysis (fastest feedback, runs first)
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run Ruff linter
        run: |
          uv pip install ruff --system
          ruff check backend/src/

  # ─────────────────────────────────────────────────────────────────────────
  # Gate 2 — Tests (run in parallel, all need lint to pass first)
  # ─────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: |
          uv sync --frozen --group dev
          uv run pytest backend/tests/unit/ -v

  integration-tests:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run integration tests
        run: |
          uv sync --frozen --group dev
          uv run pytest backend/tests/integration/ -v

  infrastructure-tests:
    name: "Infrastructure & Portability Tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run infrastructure and portability tests
        run: |
          uv sync --frozen --group dev
          uv run pytest backend/tests/infrastructure/ -v

  frontend-unit-tests:
    name: "Frontend Unit & Component Tests"
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Run coverage
        run: npm run coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: frontend/coverage/

  # ─────────────────────────────────────────────────────────────────────────
  # Gate 3 — Build validation (runs only when all tests are green)
  # ─────────────────────────────────────────────────────────────────────────
  docker-compose-build:
    name: "Docker Compose Build"
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, infrastructure-tests, frontend-unit-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create environment file from example
        # docker-compose.yml requires a .env file for variable substitution.
        # .env.example contains safe placeholder values suitable for a build test.
        run: cp .env.example .env

      - name: Build all Docker images
        run: docker compose build

  frontend-e2e:
    name: "Frontend E2E"
    runs-on: ubuntu-latest
    needs: [frontend-unit-tests, unit-tests, integration-tests, infrastructure-tests]
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/

  # ─────────────────────────────────────────────────────────────────────────
  # Independent — DVC data tracking (no dependency on test results)
  # ─────────────────────────────────────────────────────────────────────────
  dvc-check:
    name: "DVC Data Tracking"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check DVC data tracking status
        # dvc and dvc-gdrive are already declared in [dependency-groups.dev],
        # so uv sync provides them without needing --system installs.
        run: |
          uv sync --frozen --group dev
          uv run dvc status
