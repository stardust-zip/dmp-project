name: DMP Platform CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  integration-check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v8

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Code Linter & Format Test
      run: |
        uv pip install ruff --system
        ruff check backend/src/

    - name: Run Tests
      run: |
        uv sync --frozen --group dev
        uv run pytest backend/tests/ -v

    - name: DVC Test (Data Tracking)
      run: |
        uv pip install dvc dvc-gdrive --system
        dvc status

    - name: Docker Compose Build Test
      run: |
        docker compose build
