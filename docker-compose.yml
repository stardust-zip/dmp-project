services:
  db:
    image: postgres:17-alpine
    container_name: dmp_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - dmp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:8.8-alpine
    container_name: dmp_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dmp_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mlflow:
    build:
      context: .
      dockerfile: mlflow/Dockerfile
    container_name: dmp_mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dmp_network
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
      --allowed-hosts mlflow,localhost,mlflow:5000,localhost:5000
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dmp_backend
    working_dir: /app
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/backend/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./pyproject.toml:/app/pyproject.toml
      - ./data:/app/data
      - mlflow_artifacts:/mlflow/artifacts
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    networks:
      - dmp_network
    command: >
      sh -c "alembic upgrade head &&
      python -m src.seeders.users &&
      uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dmp_worker
    working_dir: /app
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/backend/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./pyproject.toml:/app/pyproject.toml
      - ./data:/app/data
      - mlflow_artifacts:/mlflow/artifacts
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    networks:
      - dmp_network
    command: celery -A src.tasks worker --loglevel=info
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dmp_frontend
    ports:
      - "3001:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - NEXT_PUBLIC_API_URL=/api/backend
      - BACKEND_API_URL=http://backend:8000
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - backend
    networks:
      - dmp_network
    restart: unless-stopped

  jupyter:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm
    container_name: dmp_jupyter
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8888:8888"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - UV_PROJECT_ENVIRONMENT=/opt/.venv
    depends_on:
      - mlflow
      - redis
    networks:
      - dmp_network
    command: >
      bash -c "uv sync &&
      uv run jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=''"

  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: dmp_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - dmp_network
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.0.2
    container_name: dmp_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3003:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - dmp_network
    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  dbgate:
    image: dbgate/dbgate:latest
    container_name: dbgate-web
    restart: unless-stopped
    ports:
      - "3002:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - CONNECTIONS=dmp_pg
      - LABEL_dmp_pg=DMP PostgreSQL
      - SERVER_dmp_pg=db
      - USER_dmp_pg=${POSTGRES_USER}
      - PASSWORD_dmp_pg=${POSTGRES_PASSWORD}
      - PORT_dmp_pg=5432
      - DATABASE_dmp_pg=${POSTGRES_DB}
      - ENGINE_dmp_pg=postgres@dbgate-plugin-postgres
    networks:
      - dmp_network
    volumes:
      - dbgate_data:/root/.dbgate

networks:
  dmp_network:
    driver: bridge

volumes:
  pgdata:
  redis_data:
  mlflow_artifacts:
  prom_data:
  grafana_data:
  dbgate_data:
  frontend_node_modules:
