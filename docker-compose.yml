services:
  db:
    image: postgres:15-alpine
    container_name: dmp_mlflow_db
    environment:
      POSTGRES_USER: mlflow_user
      POSTGRES_PASSWORD: mlflow_password
      POSTGRES_DB: mlflow_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - dmp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow_user -d mlflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    container_name: dmp_mlflow_server
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://mlflow_user:mlflow_password@db:5432/mlflow_db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - ./mlflow_artifacts:/mlflow/artifacts
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dmp_network
    # Uses uv to install mlflow and psycopg2 on the fly, then starts the server
    command: >
      bash -c "uv pip install --system mlflow psycopg2-binary &&
      mlflow server
      --backend-store-uri postgresql://mlflow_user:mlflow_password@db:5432/mlflow_db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000"

  # Workspace: Your team's shared development environment
  workspace:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm
    container_name: dmp_ml_workspace
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8888:8888" # JupyterLab
      - "8000:8000" # FastAPI (For Phase II)
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    networks:
      - dmp_network
    command: >
      bash -c "uv sync &&
      uv run jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=''"

  prometheus:
    image: prom/prometheus:latest
    container_name: dmp_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prom_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - dmp_network

  grafana:
    image: grafana/grafana:latest
    container_name: dmp_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - dmp_network

networks:
  dmp_network:
    driver: bridge

volumes:
  pgdata:
  prom_data:
  grafana_data:
